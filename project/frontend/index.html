<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices Dashboard</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #eaeaea;
            --primary-btn: #000000;
            --primary-btn-hover: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 10px 0;
        }

        p.subtitle {
            color: #666666;
            margin: 0;
            font-size: 14px;
        }

        .card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 16px 0;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .status-box {
            background: #f9f9f9;
            border-radius: 6px;
            padding: 16px;
            font-family: monospace;
            font-size: 13px;
            color: #555;
            min-height: 20px;
            margin-bottom: 16px;
            word-wrap: break-word;
        }

        button {
            background-color: var(--primary-btn);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            width: 100%;
        }

        button:hover {
            background-color: var(--primary-btn-hover);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Microservices Panel</h1>
            <p class="subtitle">Simple interaction interface</p>
        </header>

        <div class="card">
            <h2 class="card-title">Auth Service Test</h2>
            <div id="auth-status" class="status-box">Waiting to test...</div>
            <button onclick="testAuthService()">Ping Auth Service</button>
        </div>
        
        <!-- You can add more cards here for other services later -->
    </div>

    <script>
        async function testAuthService() {
            const statusEl = document.getElementById('auth-status');
            statusEl.textContent = 'Testing connection...';
            statusEl.style.color = '#555';
            
            try {
                // Fetching via API Gateway
                const response = await fetch('/api/auth/health');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                statusEl.textContent = 'Success: ' + JSON.stringify(data, null, 2);
                statusEl.style.color = 'green';
            } catch (error) {
                statusEl.textContent = 'Error: Could not connect to Auth Service.\n' + error.message;
                statusEl.style.color = 'red';
            }
        }
    </script>
</body>
</html>
