<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices Dashboard</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #eaeaea;
            --primary-btn: #000000;
            --primary-btn-hover: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 10px 0;
        }

        p.subtitle {
            color: #666666;
            margin: 0;
            font-size: 14px;
        }

        .card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: white;
            background-color: #ccc;
        }

        .badge.up { background-color: #2ecc71; }
        .badge.down { background-color: #e74c3c; }

        .status-box {
            background: #f9f9f9;
            border-radius: 6px;
            padding: 16px;
            font-family: monospace;
            font-size: 13px;
            color: #555;
            min-height: 20px;
            margin-bottom: 16px;
            word-wrap: break-word;
        }

        button {
            background-color: var(--primary-btn);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            width: 100%;
        }

        button:hover {
            background-color: var(--primary-btn-hover);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Microservices Panel</h1>
            <p class="subtitle">Simple interaction interface</p>
        </header>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Auth Service</h2>
                <span id="auth-badge" class="badge">Checking...</span>
            </div>
            <div id="auth-status" class="status-box">Waiting to test...</div>
            <button onclick="testService('auth')">Ping Auth Service</button>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Product Service</h2>
                <span id="product-badge" class="badge">Checking...</span>
            </div>
            <div id="product-status" class="status-box">Waiting to test...</div>
            <button onclick="testService('product')">Ping Product Service</button>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Order Service</h2>
                <span id="order-badge" class="badge">Checking...</span>
            </div>
            <div id="order-status" class="status-box">Waiting to test...</div>
            <button onclick="testService('order')">Ping Order Service</button>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">User Service</h2>
                <span id="user-badge" class="badge">Checking...</span>
            </div>
            <div id="user-status" class="status-box">Waiting to test...</div>
            <button onclick="testService('user')">Ping User Service</button>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Chat Service</h2>
                <span id="chat-badge" class="badge">Checking...</span>
            </div>
            <div id="chat-status" class="status-box">Waiting to test...</div>
            <button onclick="testService('chat')">Ping Chat Service</button>
        </div>
    </div>

    <script>
        async function testService(serviceName) {
            const statusEl = document.getElementById(`${serviceName}-status`);
            const badgeEl = document.getElementById(`${serviceName}-badge`);
            statusEl.textContent = `Testing connection to ${serviceName}...`;
            
            try {
                const response = await fetch(`/api/${serviceName}/health`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                statusEl.textContent = 'Success: ' + JSON.stringify(data, null, 2);
                statusEl.style.color = 'green';
                
                badgeEl.textContent = 'UP';
                badgeEl.className = 'badge up';
            } catch (error) {
                statusEl.textContent = `Error: Could not connect to ${serviceName} Service.\n` + error.message;
                statusEl.style.color = 'red';
                
                badgeEl.textContent = 'DOWN';
                badgeEl.className = 'badge down';
            }
        }

        // Run checks on load
        window.onload = () => {
            ['auth', 'product', 'order', 'user', 'chat'].forEach(testService);
        };
    </script>
</body>
</html>
